<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velozzy | Keyzzilla Labs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #00a2ff; --text: #ffffff; --grid: rgba(0, 162, 255, 0.08); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        #grid-bg { position: fixed; top: 0; left: 0; width: 200%; height: 200%; background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; transform: translate(-25%, -25%) rotateX(45deg); transition: transform 0.1s ease-out; }
        nav { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .glass-card { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); padding: 60px; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; max-width: 650px; margin: auto; }
        h1 { font-size: 4.5rem; margin: 0; letter-spacing: -4px; background: linear-gradient(#fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cta-button { background: var(--text); color: var(--bg); padding: 18px 45px; border-radius: 12px; text-decoration: none; font-weight: 800; transition: 0.3s; display: inline-block; margin-top: 30px; }
        .footer-links { margin-top: 30px; display: flex; gap: 20px; justify-content: center; font-size: 0.8rem; }
        .footer-links a { color: var(--accent); text-decoration: none; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="grid-bg"></div>
    <nav><div style="font-weight:900;">VELOZZY</div></nav>
    <div class="glass-card">
        <h1>velozzy</h1>
        <p style="color:#888; margin: 20px 0;">high-performance browsing by <strong>@keyzzilla</strong>. ultra-fast, secure, and custom-built.</p>
        <a href="download.html" class="cta-button">DOWNLOAD v1.0</a>
        <div class="footer-links">
            <a href="terms.html">Terms of Service</a>
            <a href="https://ko-fi.com/keyzzilla">Support</a>
        </div>
    </div>
    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            document.getElementById('grid-bg').style.transform = `translate(calc(-25% + ${x * 60}px), calc(-25% + ${y * 60}px)) rotateX(45deg)`;
        });
    </script>
</body>
</html>
